version: "3.9"

services:
  apache:
    build:
      context: ./docker/apache
      dockerfile: Dockerfile
    container_name: apache
    restart: unless-stopped
    volumes:
      - ./src:/usr/local/apache2/htdocs
      - ./ssl/:/usr/local/apache2/conf/ssl:ro
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    networks:
      - apache-network
    environment:
      - TZ=Europe/Moscow
    depends_on:
      - php

  # PHP-FPM 8.3 (production)
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: php-fpm
    restart: unless-stopped
    volumes:
      # Application documents (same path as Apache)
      - ./src:/var/www/html
    networks:
      - apache-network
    environment:
      - TZ=Europe/Moscow

  dhparam:
    image: alpine/openssl:latest
    volumes:
      - ./ssl:/etc/ssl
    command: ["dhparam", "-out", "/etc/ssl/dhparam.pem", "4096"]
    profiles:
      - dhparam

  ssl-generator:
    image: alpine/openssl:latest
    volumes:
      - ./ssl:/certs
    command: [
      "req", "-x509", "-nodes", "-days", "365", "-newkey", "rsa:4096",
      "-keyout", "/certs/ssl-cert-snakeoil.key",
      "-out", "/certs/ssl-cert-snakeoil.pem",
      "-subj", "/CN=localhost",
      "-addext", "subjectAltName = DNS:localhost,IP:127.0.0.1"
    ]
    profiles:
      - ssl

networks:
  apache-network:
    name: apache-prod-network
    driver: bridge